<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UFO Kebonsari</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Outfit',sans-serif;
  background:#0f172a;
  color:white;
  padding:20px;
}

.header{text-align:center;margin-bottom:20px;}
.header h1{font-size:42px;margin:0;}

.search-box{
  display:flex;
  justify-content:center;
  margin-bottom:20px;
}

select{
  padding:12px;
  border-radius:12px;
  width:300px;
}

.menu-tab{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:20px;
}

.menu-tab button{
  padding:10px 16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.card{
  background:#1e293b;
  padding:15px;
  margin-bottom:10px;
  border-radius:12px;
}

.row{
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,.1);
  padding:5px 0;
}

/* LOGIN */
#loginBox{
  position:fixed;
  inset:0;
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.popup-btn{
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* POPUP */
#popup{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
}

#popup div{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  text-align:center;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <div style="width:300px;background:#1e293b;padding:20px;border-radius:12px;text-align:center;">
    <h3>LOGIN UFO</h3>
    <input id="pinInput" type="password" placeholder="PIN" style="width:100%;padding:10px;border-radius:8px;border:none;">
    <br><br>
    <button class="popup-btn" onclick="login()">LOGIN</button>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <h1>UFO DASHBOARD</h1>
</div>

<!-- SELECT -->
<div class="search-box">
  <select id="nama"></select>
</div>

<!-- MENU -->
<div class="menu-tab">
  <button onclick="cari()">Absensi</button>
  <button onclick="cariPenjualan()">Penjualan</button>
  <button onclick="cariUC()">UC</button>
</div>

<!-- OUTPUT -->
<div id="summary"></div>
<div id="hasil"></div>

<!-- POPUP -->
<div id="popup">
  <div>
    <div id="popupText"></div>
    <br>
    <button onclick="tutupPopup()" class="popup-btn">OK</button>
  </div>
</div>

<script>

const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwBMxlujfB7xE68welYbFrC5utj4cF7r9sx_kqWxr7iXL50B0jBWRWxUjJolc72HJ-8mA/exec";

/* ================= POPUP ================= */
function showPopup(msg){
  document.getElementById("popupText").innerHTML = msg;
  document.getElementById("popup").style.display="block";
}

function tutupPopup(){
  document.getElementById("popup").style.display="none";
}

/* ================= LOGIN ================= */
async function login(){
  const pin = document.getElementById("pinInput").value;

  const res = await fetch(WEBAPP_URL+"?action=login&pin="+encodeURIComponent(pin));
  const data = await res.json();

  if(data.success){
    localStorage.setItem("ufo_login","true");
    localStorage.setItem("ufo_nama",data.nama);

    document.getElementById("loginBox").style.display="none";
    showPopup("Selamat datang "+data.nama);
  }else{
    showPopup("PIN salah!");
  }
}

/* ================= AUTO LOGIN ================= */
window.onload = function(){
  if(localStorage.getItem("ufo_login")==="true"){
    document.getElementById("loginBox").style.display="none";
  }
  loadNama();
};

/* ================= LOAD NAMA ================= */
async function loadNama(){
  const res = await fetch(WEBAPP_URL+"?action=nama");
  const data = await res.json();

  let html = `<option value="">Pilih Nama</option>`;
  data.forEach(n=>{
    html += `<option value="${n}">${n}</option>`;
  });

  document.getElementById("nama").innerHTML = html;
}

/* ================= ABSENSI ================= */
async function cari(){
  const nama = document.getElementById("nama").value;
  if(!nama) return showPopup("Pilih nama");

  const res = await fetch(WEBAPP_URL+"?nama="+encodeURIComponent(nama));
  const result = await res.json();

  let html = "";
  result.data.forEach(x=>{
    html += `
    <div class="card">
      <div>${x.tanggal}</div>
      <div class="row"><span>Masuk</span><span>${x.masuk||"-"}</span></div>
      <div class="row"><span>Pulang</span><span>${x.pulang||"-"}</span></div>
    </div>`;
  });

  document.getElementById("hasil").innerHTML = html;
}

/* ================= PENJUALAN ================= */
async function cariPenjualan(){
  const nama = document.getElementById("nama").value;
  if(!nama) return showPopup("Pilih nama");

  const res = await fetch(WEBAPP_URL+"?action=penjualan&nama="+encodeURIComponent(nama));
  const data = await res.json();

  document.getElementById("summary").innerHTML =
  `<div class="card">
    <h3>${nama}</h3>
    <p>Total Unit: ${data.totalUnit}</p>
    <p>Total Omzet: ${data.totalOmzet}</p>
  </div>`;
}

/* ================= UC ================= */
async function cariUC(){
  const nama = document.getElementById("nama").value;
  if(!nama) return showPopup("Pilih nama");

  const res = await fetch(WEBAPP_URL+"?action=uc&nama="+encodeURIComponent(nama));
  const data = await res.json();

  document.getElementById("summary").innerHTML =
  `<div class="card">
    <h3>${nama}</h3>
    <p>Total UC: ${data.totalUC}</p>
  </div>`;
}

</script>

</body>
</html>
