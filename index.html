<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Absensi UFO Kebonsari</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:25px;
    font-family:'Outfit',sans-serif;
    min-height:100vh;

    background:
    radial-gradient(
        circle at top,
        rgba(59,130,246,.12) 0%,
        transparent 45%
    ),
    linear-gradient(
        180deg,
        #0f172a 0%,
        #111827 100%
    );

    color:white;
}
.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    font-size:52px;
    font-weight:800;
    margin:0;
    letter-spacing:-2px;

    background:linear-gradient(
        90deg,
        #ffffff,
        #60a5fa
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.header p{
    color:#94a3b8;
    font-size:15px;
    margin-top:8px;
}
.search-box{
    max-width:700px;
    margin:0 auto 25px;
    display:flex;
    gap:10px;
}

.search-box input{
    flex:1;
    padding:14px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.15);
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    color:white;
    font-size:16px;
}

.search-box input::placeholder{
    color:#cbd5e1;
}

.search-box button{
    padding:14px 24px;
    border:none;
    border-radius:16px;
    cursor:pointer;
    font-weight:600;
    color:white;

    background:linear-gradient(
        135deg,
        #3b82f6,
        #06b6d4
    );
}

.search-box button:hover{
    opacity:.9;
}

#summary{
    max-width:1200px;
    margin:0 auto 25px;
}

.summary-card{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.12);
    border-radius:24px;
    padding:20px;
    color:white;
}

.summary-card h2{
    margin-top:0;
}

.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:18px;
}

.card{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.12);
    border-radius:24px;
    padding:18px;
    transition:.2s;
}

.card:hover{
    transform:translateY(-4px);
}

.card.success{
    border-left:5px solid #16a34a;
}

.card.warning{
    border-left:5px solid #dc2626;
}

.tanggal{
    text-align:center;
    font-weight:700;
    margin-bottom:15px;
    color:white;
}

.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 0;
    border-bottom:1px solid rgba(255,255,255,.1);
    color:#e2e8f0;
    font-size:14px;
}

.row:last-child{
    border-bottom:none;
}

.ok{
    font-weight:600;
    color:white;
}

.kosong{
    color:#f87171;
    font-weight:700;
}

.status-ok{
    color:#4ade80;
    font-weight:700;
}

.status-warning{
    color:#f87171;
    font-weight:700;
}

/* TABLET */
@media(max-width:1024px){

    .grid{
        grid-template-columns:repeat(2,1fr);
    }

}

/* HP */
@media(max-width:768px){

    body{
        padding:15px;
    }

    .header h1{
        font-size:36px;
    }

    .search-box{
        flex-direction:column;
    }

    .grid{
        grid-template-columns:repeat(2,1fr);
        gap:10px;
    }

    .card{
        padding:12px;
    }

    .row{
        font-size:12px;
    }

    .tanggal{
        font-size:13px;
    }
}


</style>
</head>
<body>

<div class="header">
    <h1>UFO Attendance</h1>
    <p>Monitoring Absensi Karyawan UFO Kebonsari</p>
</div>

<div class="search-box">
    <input id="nama" placeholder="Masukkan Nama">
    <button onclick="cari()">Cari</button>
</div>

<div style="max-width:700px;margin:0 auto 20px;">
    <select id="bulan" style="
        width:100%;
        padding:14px;
        border-radius:16px;
        border:1px solid rgba(255,255,255,.15);
        background:rgba(255,255,255,.08);
        color:white;
        font-size:16px;
        backdrop-filter:blur(12px);
    ">
        <option value="">Semua Bulan</option>
    </select>
</div>

<div id="summary"></div>

<div id="hasil" class="grid"></div>

<script>

const WEBAPP_URL =
"https://script.google.com/macros/s/AKfycbwBMxlujfB7xE68welYbFrC5utj4cF7r9sx_kqWxr7iXL50B0jBWRWxUjJolc72HJ-8mA/exec";

function tampil(v){

    return (v && v.trim() !== "")
    ? `<span class="ok">${v}</span>`
    : `<span class="kosong">-</span>`;
function isiBulan(data){

    const select = document.getElementById("bulan");

    if(!select) return;

    const bulanSet = new Set();

    data.forEach(item => {

        if(item.bulan){
            bulanSet.add(item.bulan);
        }

    });

    select.innerHTML =
    '<option value="">Semua Bulan</option>';

    bulanSet.forEach(bulan => {

        const option =
        document.createElement("option");

        option.value = bulan;
        option.textContent = bulan;

        select.appendChild(option);

    });

}
}

async function cari(){

    const nama =
    document.getElementById("nama").value.trim();

    if(!nama){
        alert("Masukkan nama terlebih dahulu");
        return;
    }

    const res =
    await fetch(
        WEBAPP_URL +
        "?nama=" +
        encodeURIComponent(nama)
    );

    const result = await res.json();

const data = result.data || [];
console.log(data[0]);

isiBulan(data);

const terlambat = result.terlambat || 0;
    data.sort(
        (a,b)=>
        Number(a.tanggal)-Number(b.tanggal)
    );

    let belumPulang = 0;

    data.forEach(x=>{
        if(!x.pulang){
            belumPulang++;
        }
    });

    if(data.length){

        document.getElementById("summary").innerHTML = `
        <div class="summary-card">
            <h2>👤 ${data[0].nama}</h2>
            <p>Total Hari Absen : <b>${data.length}</b></p>
            <p>Belum Scan Pulang : <b>${belumPulang}</b></p>
            <p>Datang Terlambat : <b>${terlambat}</b></p>
        </div>
        `;

    }else{

        document.getElementById("summary").innerHTML = "";

    }

    let html = "";

    data.forEach(x=>{

        const status =
        x.pulang
        ? '<span class="status-ok">Lengkap</span>'
        : '<span class="status-warning">Belum Lengkap</span>';

        const kelasCard =
        x.pulang
        ? "success"
        : "warning";

        html += `
        <div class="card ${kelasCard}">

            <div class="tanggal">
                📅 Tanggal ${x.tanggal}<br>
                ${status}
            </div>

            <div class="row">
                <span>Masuk</span>
                ${tampil(x.masuk)}
            </div>

            <div class="row">
                <span>Istirahat 1</span>
                ${tampil(x.istirahat1)}
            </div>

            <div class="row">
                <span>Kembali 1</span>
                ${tampil(x.kembali1)}
            </div>

            <div class="row">
                <span>Istirahat 2</span>
                ${tampil(x.istirahat2)}
            </div>

            <div class="row">
                <span>Kembali 2</span>
                ${tampil(x.kembali2)}
            </div>

            <div class="row">
                <span>Pulang</span>
                ${tampil(x.pulang)}
            </div>

        </div>
        `;

    });

    if(data.length===0){

        html = `
        <div class="card">
            Data tidak ditemukan
        </div>
        `;

    }

    document.getElementById("hasil").innerHTML = html;

}

document
.getElementById("nama")
.addEventListener("keypress",function(e){

    if(e.key==="Enter"){
        cari();
    }

});

</script>

</body>
</html>
