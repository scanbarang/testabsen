<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UFO Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Outfit',sans-serif;
  background:#0f172a;
  color:white;
  padding:25px;
}

/* LOGIN */
#loginBox{
  position:fixed;
  inset:0;
  background:#0f172a;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.login-card{
  background:#1e293b;
  padding:30px;
  border-radius:20px;
  width:300px;
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  margin-top:10px;
  text-align:center;
}

button{
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#3b82f6,#06b6d4);
  color:white;
  cursor:pointer;
  width:100%;
}

/* POPUP */
#popup{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  z-index:9999;
}

.popup-box{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#1e293b;
  padding:25px;
  border-radius:15px;
  min-width:250px;
  text-align:center;
}

/* UI */
.header{
  text-align:center;
  margin-top:20px;
}

.grid{
  margin-top:20px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <div class="login-card">
    <h2>LOGIN UFO</h2>
    <input id="pinInput" type="password" placeholder="PIN">
    <button onclick="login()">LOGIN</button>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <h1>UFO DASHBOARD</h1>
</div>

<!-- SELECT -->
<select id="nama"></select>

<div id="summary"></div>
<div id="hasil" class="grid"></div>

<!-- POPUP -->
<div id="popup">
  <div class="popup-box">
    <div id="popupText"></div>
    <button onclick="tutupPopup()">OK</button>
  </div>
</div>

<script>
const WEBAPP_URL = "https://script.google.com/macros/s/XXXXX/exec";

/* ================= LOGIN ================= */
async function login(){
  try{
    const pin = document.getElementById("pinInput").value;

    const res = await fetch(WEBAPP_URL + "?action=login&pin=" + encodeURIComponent(pin));
    const data = await res.json();

    if(data.success){
      localStorage.setItem("ufo_login","true");
      localStorage.setItem("ufo_nama",data.nama);

      document.getElementById("loginBox").style.display="none";
      showPopup("Selamat datang " + data.nama);
    }else{
      showPopup("PIN salah!");
    }
  }catch(e){
    console.log(e);
  }
}

/* ================= AUTO LOGIN ================= */
document.addEventListener("DOMContentLoaded",()=>{
  if(localStorage.getItem("ufo_login")==="true"){
    document.getElementById("loginBox").style.display="none";
  }
  loadNama();
});

/* ================= POPUP ================= */
function showPopup(msg){
  document.getElementById("popupText").innerText=msg;
  document.getElementById("popup").style.display="block";
}

function tutupPopup(){
  document.getElementById("popup").style.display="none";
}

/* ================= LOAD NAMA ================= */
async function loadNama(){
  const res = await fetch(WEBAPP_URL+"?action=nama");
  const data = await res.json();

  let html=`<option value="">Pilih Nama</option>`;
  data.forEach(n=>{
    html+=`<option value="${n}">${n}</option>`;
  });

  document.getElementById("nama").innerHTML=html;
}
</script>

</body>
</html>
